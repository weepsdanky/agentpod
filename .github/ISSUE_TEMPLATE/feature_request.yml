name: Feature Request
description: Propose a new feature or enhancement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a feature request, check the existing issues and roadmap in the README.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case. What can you not do today that you want to do?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - plugin/tools
        - plugin/service
        - plugin/policy
        - plugin/tasks
        - plugin/source-doc
        - hub/join
        - hub/projection
        - hub/openagents
        - protocol types
        - docs/examples
        - other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought about?

  - type: checkboxes
    id: contribution
    attributes:
      label: Would you be willing to implement this?
      options:
        - label: Yes, I can open a PR for this.
